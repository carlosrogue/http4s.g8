on:
  workflow_dispatch:
  # schedule:
  #  - cron: '0/5 * * * *' # every 5th minute
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

name: Launch Steward

permisions:
  contents: write
  pull-requests: write

jobs:
  scala-steward:
    runs-on: ubuntu-latest
    name: Launch Scala Steward
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: scala-steward-org/scala-steward-action@2.75.0
        with:
          mill-version: 0.12.8
          github-repository: carlosrogue/http4s.g8
          branches: 0.23-scala3-mill
          author-email: scala-steward@users.noreply.github.com
          author-name: Scala Steward
